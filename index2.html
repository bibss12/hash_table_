<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Akun - Hash Table</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-image: url("a.png");
            background-size: cover;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        td, th {
            border: 1px solid black;
            padding: 8px;
        }

        #hashView {
            margin-top: 20px;
            background: white;
            padding: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

<h2>Manajemen Akun (Hash Table)</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password"><br>

<button onclick="simpan()">Register</button>
<button onclick="login()">Login</button>
<button onclick="cari()">Search</button>
<button onclick="hapus()">Delete</button>
<button onclick="tampil()">Show All</button>

<p id="output"></p>

<table id="tabelUser">
    <tr>
        <th>Username</th>
        <th>Password</th>
    </tr>
</table>

<h3>Struktur Hash Table</h3>
<div id="hashView"></div>

<script>
// ================= HASH TABLE =================
class HashTable {
    constructor(size = 10) {
        this.table = new Array(size);
    }

    hash(key) {
        let total = 0;
        for (let i = 0; i < key.length; i++) {
            total += key.charCodeAt(i);
        }
        return total % this.table.length;
    }

    put(key, value) {
        let index = this.hash(key);

        if (!this.table[index]) {
            this.table[index] = [];
        }

        for (let pair of this.table[index]) {
            if (pair[0] === key) {
                pair[1] = value;
                return;
            }
        }

        this.table[index].push([key, value]);
    }

    get(key) {
        let index = this.hash(key);

        if (this.table[index]) {
            for (let pair of this.table[index]) {
                if (pair[0] === key) return pair[1];
            }
        }
        return null;
    }

    remove(key) {
        let index = this.hash(key);

        if (this.table[index]) {
            this.table[index] = this.table[index].filter(
                pair => pair[0] !== key
            );
        }
    }

    getAll() {
        let result = [];
        for (let bucket of this.table) {
            if (bucket) {
                for (let pair of bucket) {
                    result.push(pair);
                }
            }
        }
        return result;
    }
}

// ================= APP =================
let ht = new HashTable();

function output(msg) {
    document.getElementById("output").innerText = msg;
}

function simpan() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (!user || !pass) {
        output("Isi semua data!");
        return;
    }

    if (ht.get(user)) {
        output("User sudah ada!");
        return;
    }

    ht.put(user, pass);
    output("Registrasi berhasil!");
    tampilHash();
}

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let stored = ht.get(user);

    if (stored === pass) {
        output("Login berhasil!");
    } else {
        output("Login gagal!");
    }
}

function cari() {
    let user = document.getElementById("username").value;
    let result = ht.get(user);

    output(result ? "Password: " + result : "User tidak ditemukan!");
}

function hapus() {
    let user = document.getElementById("username").value;
    ht.remove(user);

    output("Data dihapus!");
    tampilHash();
}

function tampil() {
    let data = ht.getAll();
    let table = document.getElementById("tabelUser");

    table.innerHTML = `
        <tr>
            <th>Username</th>
            <th>Password</th>
        </tr>
    `;

    for (let item of data) {
        let row = table.insertRow();
        row.insertCell(0).innerText = item[0];
        row.insertCell(1).innerText = item[1];
    }
}

function tampilHash() {
    let div = document.getElementById("hashView");
    div.innerHTML = "";

    ht.table.forEach((bucket, index) => {
        let text = `Index ${index}: `;

        if (bucket) {
            text += bucket.map(p => `[${p[0]}, ${p[1]}]`).join(" -> ");
        } else {
            text += "Kosong";
        }

        let p = document.createElement("p");
        p.innerText = text;
        div.appendChild(p);
    });
}
</script>

</body>
</html>
